substitutions:
  # Wind speed/gust transition timing
  transition_lockout_ms: "2000"
  gust_to_speed_target_ms: "6000"
  speed_to_gust_target_ms: "14000"
  # Weather beacon thresholds
  temp_extreme_low: "0.0f"
  temp_comfort_low: "13.0f"
  temp_comfort_high: "28.0f"
  temp_extreme_high: "35.0f"
  precip_proba_threshold: "15.0f"

esphome:
  name: esphome-web-1d95ee
  friendly_name: D1Mini_WindIndicator
  min_version: 2025.9.0
  name_add_mac_suffix: false

esp8266:
  board: d1_mini

# Enable logging
logger:
  level: INFO
  logs:
    # Reduce verbosity for components that might log sensitive data
    wifi: WARN
    api: WARN

# Enable Home Assistant API
api:
  encryption:
    key: !secret api_encryption_key
  on_client_disconnected:
    - logger.log: "Home Assistant disconnected! Safety shutdown triggered."
    - output.set_level:
        id: pwm_output
        level: 0.0

# Allow Over-The-Air updates
ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  min_auth_mode: WPA2
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "WindIndicator Fallback"
    password: !secret fallback_password

captive_portal:

script:
  - id: update_forecast_day
    then:
      - lambda: |-
          if (id(ha_time).now().is_valid()) {
            auto t = id(ha_time).now();
            bool next = t.hour >= 17;
            if (next != id(use_tomorrow_forecast)) {
              id(use_tomorrow_forecast) = next;
              ESP_LOGI("forecast", "Forecast day switched to %s (time: %02d:%02d)",
                       next ? "tomorrow" : "today", t.hour, t.minute);
            }
          }
      - component.update: ha_daytime_high_temp_selected
      - component.update: ha_precipitation_prob_selected

time:
  - platform: homeassistant
    id: ha_time
    on_time_sync:
      then:
        - script.execute: update_forecast_day
    on_time:
      - seconds: 0
        minutes: /1
        then:
          - script.execute: update_forecast_day

# --- Globals for State Management ---
globals:
  - id: is_gust_mode
    type: bool
    restore_value: false
    initial_value: 'false' # False = Wind Speed, True = Wind Gust
  - id: last_transition_time
    type: int
    restore_value: false
    initial_value: '0'
  - id: use_tomorrow_forecast
    type: bool
    restore_value: false
    initial_value: 'false'


light:
  # Built-in LED showing status
  - platform: status_led
    id: builtin_led
    name: "Built-in LED"
    internal: true
    restore_mode: RESTORE_DEFAULT_ON
    pin:
      number: D4
      inverted: True
  # Red LED for weather beacon
  - platform: monochromatic
    id: red_led
    output: pwm_red_led
    internal: true
    default_transition_length: 500ms
    effects:
      - flashing:
          name: "Blink"
          duration_on: 1s
          duration_off: 1s
  # Blue LED for weather beacon
  - platform: monochromatic
    id: blue_led
    output: pwm_blue_led
    internal: true
    default_transition_length: 500ms
    effects:
      - flashing:
          name: "Blink"
          duration_on: 1s
          duration_off: 1s


output:
  # PWM output to drive the wind indicator
  - platform: esp8266_pwm
    pin: D1 # Pin D1 / GPIO5
    frequency: 1000 Hz
    id: pwm_output
    min_power: 0
    max_power: 0.77
  # PWM for blue LED
  - platform: esp8266_pwm
    pin: D7
    frequency: 1000 Hz
    id: pwm_blue_led
  # PWM for red LED
  - platform: esp8266_pwm
    pin: D8
    frequency: 1000 Hz
    id: pwm_red_led

# Switch exposed to HA to turn the
# built-in led on when gust speed is shown
switch:
  - platform: template
    name: "Status LED"
    id: led_switch
    optimistic: true
  - platform: template
    name: "Weather LEDs"
    id: weather_leds_switch
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON

number:
  - platform: template
    name: "Red LED Brightness"
    id: red_led_brightness
    min_value: 0
    max_value: 100
    step: 1
    initial_value: 100
    restore_value: true
    optimistic: true
    unit_of_measurement: "%"

  - platform: template
    name: "Blue LED Brightness"
    id: blue_led_brightness
    min_value: 0
    max_value: 100
    step: 1
    initial_value: 35
    restore_value: true
    optimistic: true
    unit_of_measurement: "%"

# Define the common filters for normalization
# This anchor allows us to reuse the filter list
.common_wind_filters:
  calibration_curve: &calibration_curve
    # The scale is not entirely linear so use a calibration curve.
    calibrate_linear:
      method: exact # linear interpolation mode
      datapoints:
            # Map from sensor value to output value
        - 0.0 -> 0.0
        - 4 -> 0.011
        - 6 -> 0.043
        - 8 -> 0.075
        - 10 -> 0.106
        - 12 -> 0.138
        - 14 -> 0.180
        - 16 -> 0.217
        - 18 -> 0.264
        - 20 -> 0.296
        - 22 -> 0.343
        - 24 -> 0.374
        - 26 -> 0.422
        - 28 -> 0.469
        - 30 -> 0.500
        - 32 -> 0.548
        - 34 -> 0.595
        - 36 -> 0.643
        - 38 -> 0.690
        - 40 -> 0.737
        - 42 -> 0.785
        - 44 -> 0.832
        - 46 -> 0.879
        - 48 -> 0.942
        - 50 -> 1

  # Clamp the value from 0 to 1
  clamp_logic: &clamp_logic
    lambda: |-
      // Clamp the value to ensure it never exceeds 0.0 - 1.0 range
      if (x > 1.0) return 1.0;
      if (x < 0.0) return 0.0;
      return x;

sensor:
  # Normalized Wind Speed Sensor (Internal)
  - platform: homeassistant
    id: ha_wind_speed_norm
    entity_id: sensor.pirateweather_wind_speed
    internal: true
    filters:
      - *calibration_curve
      - *clamp_logic

  # Normalized Wind Gust Sensor (Internal)
  - platform: homeassistant
    id: ha_wind_gust_norm
    entity_id: sensor.pirateweather_wind_gust
    internal: true
    filters:
      - *calibration_curve
      - *clamp_logic

  # Daytime max temp today (0d = today, 1d = tomorrow)
  - platform: homeassistant
    id: ha_daytime_high_temp_0d
    entity_id: sensor.pirateweather_daytime_high_apparent_temperature_0d
    internal: true
    on_value:
      then:
        - component.update: ha_daytime_high_temp_selected

  - platform: homeassistant
    id: ha_daytime_high_temp_1d
    entity_id: sensor.pirateweather_daytime_high_apparent_temperature_1d
    internal: true
    on_value:
      then:
        - component.update: ha_daytime_high_temp_selected

  # Precipitation probability (0d = today, 1d = tomorrow)
  - platform: homeassistant
    id: ha_precipitation_prob_0d
    entity_id: sensor.pirateweather_precip_probability_0d
    internal: true
    on_value:
      then:
        - component.update: ha_precipitation_prob_selected

  - platform: homeassistant
    id: ha_precipitation_prob_1d
    entity_id: sensor.pirateweather_precip_probability_1d
    internal: true
    on_value:
      then:
        - component.update: ha_precipitation_prob_selected

  # Selected values: after 17:00 local time, prefer 1d
  - platform: template
    id: ha_daytime_high_temp_selected
    internal: true
    update_interval: never
    lambda: |-
      return id(use_tomorrow_forecast)
        ? id(ha_daytime_high_temp_1d).state
        : id(ha_daytime_high_temp_0d).state;

  - platform: template
    id: ha_precipitation_prob_selected
    internal: true
    update_interval: never
    lambda: |-
      return id(use_tomorrow_forecast)
        ? id(ha_precipitation_prob_1d).state
        : id(ha_precipitation_prob_0d).state;

  # --- Diagnostics ---
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s
  - platform: uptime
    name: "Uptime"
    update_interval: 60s

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP Address"
    ssid:
      name: "Connected SSID"

interval:
  # --- Wind speed/gust state transition (probabilistic) ---
  - interval: 1s
    then:
      - lambda: |-
          uint32_t now = millis();
          uint32_t time_since_transition = now - id(last_transition_time);

          if (time_since_transition <= ${transition_lockout_ms})
            return;

          float probability = 0.0;

          if (id(is_gust_mode)) {
            // GUST -> SPEED: ramp over (target - lockout)
            if (time_since_transition >= ${gust_to_speed_target_ms}) {
              probability = 1.0;
            } else {
              probability = (time_since_transition - ${transition_lockout_ms}.0)
                / (${gust_to_speed_target_ms}.0 - ${transition_lockout_ms}.0);
            }
          } else {
            // SPEED -> GUST: ramp over (target - lockout)
            if (time_since_transition >= ${speed_to_gust_target_ms}) {
              probability = 1.0;
            } else {
              probability = (time_since_transition - ${transition_lockout_ms}.0)
                / (${speed_to_gust_target_ms}.0 - ${transition_lockout_ms}.0);
            }
          }

          float roll = (float)rand() / RAND_MAX;
          if (roll < probability) {
            id(is_gust_mode) = !id(is_gust_mode);
            id(last_transition_time) = now;
            ESP_LOGI("wind", "Transitioned to %s. (Prob: %.2f, Time: %u ms)",
              id(is_gust_mode) ? "GUST" : "SPEED", probability, time_since_transition);
          }

  # --- PWM output with jitter ---
  - interval: 0.5s
    then:
      - lambda: |-
          float speed_value = id(ha_wind_speed_norm).state;
          float gust_value = id(ha_wind_gust_norm).state;
          if (std::isnan(speed_value)) speed_value = 0.0;
          if (std::isnan(gust_value)) gust_value = 0.0;

          float target_level;

          if (id(is_gust_mode)) {
            float jitter = ((double) rand() / RAND_MAX) * 0.25 + 0.75;
            target_level = gust_value * jitter;

            if (id(led_switch).state) {
              id(builtin_led).turn_on().perform();
            }
          } else {
            float jitter = ((double) rand() / RAND_MAX) * 0.2 + 0.9;
            target_level = speed_value * jitter;

            id(builtin_led).turn_off().perform();
          }

          target_level = std::min(1.0f, std::max(0.0f, target_level));
          id(pwm_output).set_level(target_level);

  # --- Weather beacon LEDs ---
  # Red/blue LEDs inspired by the Hancock tower weather beacon.
  # Blinking is handled by the native ESPHome flashing effect;
  # this interval only makes the solid/blink/off decision.
  - interval: 5s
    then:
      - lambda: |-
          static int prev_red_state = -1;   // -1 = unknown, 0 = off, 1 = solid, 2 = blink
          static int prev_blue_state = -1;

          float high_temp = id(ha_daytime_high_temp_selected).state;
          float precipitation_prob = id(ha_precipitation_prob_selected).state;
          float red_brightness  = id(red_led_brightness).state  / 100.0f;
          float blue_brightness = id(blue_led_brightness).state / 100.0f;

          int red_state = 0;
          int blue_state = 0;

          if (!id(weather_leds_switch).state) {
            red_state = 0;
            blue_state = 0;
          } else if (std::isnan(high_temp) || std::isnan(precipitation_prob)) {
            red_state = 1;
            blue_state = 1;
          } else {
            // Red LED: extreme temps -> blink, uncomfortable bands -> solid, comfort zone -> off
            if (high_temp < ${temp_extreme_low} || high_temp > ${temp_extreme_high}) {
              red_state = 2;
            } else if ((high_temp >= ${temp_extreme_low} && high_temp <= ${temp_comfort_low})
                    || (high_temp >= ${temp_comfort_high} && high_temp <= ${temp_extreme_high})) {
              red_state = 1;
            }

            // Blue LED: precipitation -> blink, comfort zone (no precip) -> solid, else -> off
            if (precipitation_prob >= ${precip_proba_threshold}) {
              blue_state = 2;
            } else if (high_temp > ${temp_comfort_low} && high_temp < ${temp_comfort_high}) {
              blue_state = 1;
            }
          }

          // Only send commands when state actually changes
          if (red_state != prev_red_state) {
            prev_red_state = red_state;
            if (red_state == 0) {
              id(red_led).turn_off().perform();
              ESP_LOGD("weather", "Red OFF");
            } else if (red_state == 1) {
              id(red_led).turn_on().set_brightness(red_brightness).set_effect("None").perform();
              ESP_LOGD("weather", "Red SOLID");
            } else {
              id(red_led).turn_on().set_brightness(red_brightness).set_effect("Blink").perform();
              ESP_LOGD("weather", "Red BLINK");
            }
          }

          if (blue_state != prev_blue_state) {
            prev_blue_state = blue_state;
            if (blue_state == 0) {
              id(blue_led).turn_off().perform();
              ESP_LOGD("weather", "Blue OFF");
            } else if (blue_state == 1) {
              id(blue_led).turn_on().set_brightness(blue_brightness).set_effect("None").perform();
              ESP_LOGD("weather", "Blue SOLID");
            } else {
              id(blue_led).turn_on().set_brightness(blue_brightness).set_effect("Blink").perform();
              ESP_LOGD("weather", "Blue BLINK");
            }
          }